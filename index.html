<body>

<header>

<div class="container">

<input id="code" placeholder="Enter Code">

<p id="msg"></p>

<script>
function go(){
 let c=document.getElementById("code").value;
 if(c==="231897"){
  location="auth.html";
 } else {
  msg.innerText="Invalid Code";
 }
}
</script>
